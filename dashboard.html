<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>⚡ Ultra Game Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
    text-align: center;
}

h1 {
    margin: 20px;
    font-size: 45px;
    text-shadow: 0 0 20px cyan;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 25px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

button:hover {
    background: cyan;
    color: black;
    transform: scale(1.1);
}

canvas {
    margin-top: 20px;
    border-radius: 15px;
    border: 3px solid cyan;
    background: black;
}

#score, #highscore {
    font-size: 20px;
    margin: 10px;
}

</style>
</head>

<body>

<h1>🎮 Ultra Game Hub</h1>

<div class="menu">
    <button onclick="startGame('snake')">Snake 🐍</button>
    <button onclick="startGame('reaction')">Reaction ⚡</button>
</div>

<div id="score">Score: 0</div>
<div id="highscore">High Score: 0</div>

<canvas id="canvas" width="500" height="400"></canvas>

<audio id="beep" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let score = 0;
let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").innerText = "High Score: " + highscore;

let interval;

function updateScore() {
    document.getElementById("score").innerText = "Score: " + score;

    if(score > highscore){
        highscore = score;
        localStorage.setItem("highscore", highscore);
        document.getElementById("highscore").innerText = "High Score: " + highscore;
    }
}

function playSound() {
    document.getElementById("beep").play();
}

function startGame(game) {
    clearInterval(interval);
    score = 0;
    updateScore();

    if(game === "snake") snakeGame();
    if(game === "reaction") reactionGame();
}

//////////////////////
// 🐍 SNAKE PRO
//////////////////////
function snakeGame(){
    let box = 20;
    let snake = [{x: 200, y:200}];
    let food = randomFood();
    let dir = "RIGHT";

    document.onkeydown = e => {
        if(e.key==="ArrowLeft") dir="LEFT";
        if(e.key==="ArrowRight") dir="RIGHT";
        if(e.key==="ArrowUp") dir="UP";
        if(e.key==="ArrowDown") dir="DOWN";
    };

    interval = setInterval(draw, 100);

    function randomFood(){
        return {
            x: Math.floor(Math.random()*25)*box,
            y: Math.floor(Math.random()*20)*box
        };
    }

    function collision(head){
        return snake.some(s => s.x===head.x && s.y===head.y);
    }

    function draw(){
        ctx.fillStyle="black";
        ctx.fillRect(0,0,500,400);

        snake.forEach((s,i)=>{
            ctx.fillStyle = i===0?"lime":"green";
            ctx.fillRect(s.x,s.y,box,box);
        });

        ctx.fillStyle="red";
        ctx.fillRect(food.x,food.y,box,box);

        let head = {...snake[0]};

        if(dir==="LEFT") head.x-=box;
        if(dir==="RIGHT") head.x+=box;
        if(dir==="UP") head.y-=box;
        if(dir==="DOWN") head.y+=box;

        if(head.x===food.x && head.y===food.y){
            score++;
            playSound();
            updateScore();
            food = randomFood();
        } else {
            snake.pop();
        }

        if(head.x<0 || head.y<0 || head.x>480 || head.y>380 || collision(head)){
            gameOver();
            return;
        }

        snake.unshift(head);
    }
}

//////////////////////
// ⚡ REACTION GAME
//////////////////////
function reactionGame(){
    let target = randomTarget();

    canvas.onclick = function(e){
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        if(x > target.x && x < target.x+50 &&
           y > target.y && y < target.y+50){
            score++;
            playSound();
            updateScore();
            target = randomTarget();
        }
    };

    interval = setInterval(draw, 60);

    function randomTarget(){
        return {
            x: Math.random()*450,
            y: Math.random()*350
        };
    }

    function draw(){
        ctx.fillStyle="black";
        ctx.fillRect(0,0,500,400);

        ctx.fillStyle="cyan";
        ctx.fillRect(target.x,target.y,50,50);
    }
}

//////////////////////
// GAME OVER
//////////////////////
function gameOver(){
    clearInterval(interval);

    ctx.fillStyle="black";
    ctx.fillRect(0,0,500,400);

    ctx.fillStyle="red";
    ctx.font="40px Arial";
    ctx.fillText("GAME OVER", 140,200);
}
</script>

</body>
</html>
